spring.application.name=Appointment

server.port:9200

# ===============================
# = DATABASE CONFIGURATION
# ===============================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appointmentdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http:localhost:8761/eureka/}
profiles.url=${PROFILEMS_URL:http:localhost:9100}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = CONNECTION POOL (OPTIONAL)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

APPOINTMENT_NOT_FOUND=Patient not found
APPOINTMENT_ALREADY_CANCELLED = Appointment already cancelled
APPOINTMENT_ALREADY_COMPLETED = Appointment already completed
DOCTOR_NOT_FOUND = Doctor not found
PATIENT_NOT_FOUND = Patient not found
APPOINTMENT_RECORD_ALREADY_EXISTS = Appointment record already exists
APPOINTMENT_RECORD_NOT_FOUND = Appointment record not found
PRESCRIPTION_NOT_FOUND = Prescription not found
APPOINTMENT_CANCELLED=Appointment cancelled
