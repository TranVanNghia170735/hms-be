spring.application.name=PharmacyMS

server.port:9300

# ===============================
# = DATABASE CONFIGURATION
# ===============================

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pharmacydb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver

eureka.client.register-with-eureka=true
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http:localhost:8761/eureka/}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ===============================
# = JPA / HIBERNATE
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = CONNECTION POOL (OPTIONAL)
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

MEDICINE_ALREADY_EXISTS = Medicine Already Exists
MEDICINE_NOT_FOUND = Medicine not found
INVENTORY_NOT_FOUND = Medicine Inventory not found
STOCK_NOT_FOUND = Medicine stock not found
SALE_ALREADY_EXISTS = "Sale already exists"
SALE_NOT_FOUND = "Sale record not found"
INSUFFICIENT_STOCK = "A medicine in the sale has insufficient stock"

OUT_OF_STOCK=Medicine is out of stock
INVALID_QUANTITY=Requested quantity exceeds available stock
INVALID_SALE_QUANTITY=Sale quantity must be greater than zero
